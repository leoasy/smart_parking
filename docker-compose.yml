# =============================================
# smart-parking — Docker Compose 开发环境
# =============================================
# 使用方式：
#   1. cp .env.example .env（如果没有）
#   2. 修改 .env 中的密码
#   3. 确保根目录有 smart_parking.sql（数据库 dump）
#   4. docker compose up -d
#
# 常用命令：
#   docker compose up -d mysql redis   # 只启动基础设施
#   docker compose up -d               # 启动全部服务
#   docker compose --profile gateway up -d  # 包含 AI 网关
#   docker compose down -v             # 删除全部数据卷，慎用
# =============================================

name: smart-parking

services:
  # =========================
  # MySQL 8.4 LTS
  # =========================
  mysql:
    image: ${MYSQL_IMAGE:-mysql:8.4}
    container_name: smart-parking-mysql
    restart: unless-stopped

    env_file:
      - .env

    environment:
      TZ: ${TZ:-Asia/Shanghai}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-smart_parking}
      MYSQL_USER: ${MYSQL_USER:-smart_parking}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}

    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"

    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-time-zone=+08:00
      - --lower_case_table_names=1
      - --max_connections=300
      - --default-authentication-plugin=caching_sha2_password

    volumes:
      - mysql_data:/var/lib/mysql
      - ./smart_parking.sql:/docker-entrypoint-initdb.d/01-smart_parking.sql:ro

    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$${MYSQL_ROOT_PASSWORD}\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

    networks:
      - smart-parking-net

  # =========================
  # Redis
  # =========================
  redis:
    image: ${REDIS_IMAGE:-redis:7.4-alpine}
    container_name: smart-parking-redis
    restart: unless-stopped

    env_file:
      - .env

    environment:
      TZ: ${TZ:-Asia/Shanghai}

    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"

    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - ${REDIS_PASSWORD}

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

    networks:
      - smart-parking-net

  # =========================
  # RuoYi 后端
  # =========================
  ruoyi-server:
    build:
      context: ./RuoYi-SpringBoot3-Pro-master
      dockerfile: Dockerfile.java

    container_name: smart-parking-ruoyi
    restart: unless-stopped

    env_file:
      - .env

    environment:
      TZ: ${TZ:-Asia/Shanghai}

      # Spring Profile
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-devmy,docker}

      # 如果你的项目是普通 datasource，可以直接读取这些环境变量
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-smart_parking}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-smart_parking}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}

      # 如果你的项目用 Spring Boot 3 推荐写法
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      SPRING_DATA_REDIS_DATABASE: ${REDIS_DATABASE:-0}

      # Druid 控制台
      DRUID_LOGIN_USERNAME: ${DRUID_LOGIN_USERNAME}
      DRUID_LOGIN_PASSWORD: ${DRUID_LOGIN_PASSWORD}

    ports:
      - "${RUOYI_HOST_PORT:-8087}:8080"

    volumes:
      - upload_data:/data/upload
      - ./logs/ruoyi:/data/logs

    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s

    mem_limit: 1024m

    networks:
      - smart-parking-net

  # =========================
  # Parking AI 服务
  # =========================
  parking-ai:
    build:
      context: ./Parking_Ai
      dockerfile: Dockerfile.python

    container_name: smart-parking-ai
    restart: unless-stopped

    environment:
      TZ: ${TZ:-Asia/Shanghai}
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"

      RUOYI_BASE_URL: http://ruoyi-server:8080
      RUOYI_PARKING_API: /biz/parking/detect
      RUOYI_PUSH_TIMEOUT_SECONDS: "3.0"
      SLOT_CODE_FORMAT: "{parking_lot_id}-{slot_id}"

    ports:
      - "${AI_HOST_PORT:-8000}:8000"

    volumes:
      - ./Parking_Ai/model:/app/model:ro
      - ./Parking_Ai/data:/app/data

    depends_on:
      ruoyi-server:
        condition: service_healthy

    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s

    mem_limit: 2048m

    networks:
      - smart-parking-net

    # 如果服务器有 NVIDIA GPU，可以改成：
    # gpus: all

  # =========================
  # 前端 Nginx
  # =========================
  ruoyi-ui:
    build:
      context: ./RuoYi-SpringBoot3-ElementPlus-master
      dockerfile: Dockerfile.nginx

    container_name: smart-parking-ui
    restart: unless-stopped

    environment:
      TZ: ${TZ:-Asia/Shanghai}

    ports:
      - "${UI_HOST_PORT:-80}:80"

    depends_on:
      ruoyi-server:
        condition: service_healthy

    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

    networks:
      - smart-parking-net

  # =========================
  # AI 网关，可选启动
  # =========================
  new-api:
    image: calciumion/new-api:latest
    container_name: smart-parking-api-gateway
    restart: unless-stopped

    profiles:
      - gateway

    environment:
      TZ: ${TZ:-Asia/Shanghai}

    ports:
      - "${NEW_API_HOST_PORT:-3000}:3000"

    volumes:
      - new_api_data:/data

    networks:
      - smart-parking-net

volumes:
  mysql_data:
    name: smart-parking-mysql-data

  redis_data:
    name: smart-parking-redis-data

  upload_data:
    name: smart-parking-upload-data

  new_api_data:
    name: smart-parking-new-api-data

networks:
  smart-parking-net:
    name: smart-parking-net
    driver: bridge