# See https://docs.astral.sh/ruff/configuration/ for configuration documentation

line-length = 120
target-version = "py310"

[lint]
# Enable rules
enable = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # pyflakes
    "I",      # isort
    "UP",     # pyupgrade
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "SIM",    # flake8-simplify
]

# Ignore specific rules
ignore = [
    "B008",   # do not perform function calls in argument defaults
    "C901",   # too complex
    "SIM102", # use ternary instead of if/then/else
]

[lint.per-file-ignores]
"__init__.py" = ["F401", "I001"]  # unused imports OK in __init__
"tests/*" = ["S101", "B011"]       # assert OK in tests, complex is fine

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
