# =============================================
# Smart Parking — Redis 配置文件
# Redis 7.4 Alpine
# =============================================

# 网络配置
bind 0.0.0.0
port 6379
protected-mode no

# 连接配置
timeout 0
tcp-keepalive 300

# 通用配置
daemonize no
supervised no
pidfile /var/run/redis.pid
loglevel notice
logfile ""
databases 16

# 持久化 — RDB
save 900 1
save 300 10
save 60 10000
stop-writes-on-bg-save-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# 持久化 — AOF
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-load-truncated yes
aof-use-rdb-preamble yes

# 内存管理
maxmemory 256mb
maxmemory-policy allkeys-lru
maxmemory-samples 5

# 客户端输出缓冲区
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# 慢查询日志
slowlog-log-slower-than 10000
slowlog-max-len 128

# 高级配置
hash-max-ziplist-entries 512
hash-max-ziplist-value 64
list-max-ziplist-size -2
set-max-intset-entries 512
zset-max-ziplist-entries 128
zset-max-ziplist-value 64
hll-sparse-max-bytes 3000
stream-node-max-bytes 4096
stream-node-max-entries 100

# Lua 脚本超时
lua-time-limit 5000

# 延迟监控
latency-monitor-threshold 0

# 事件通知
notify-keyspace-events ""

# 安全（密码通过 docker-compose 或环境变量传入）
# requirepass 由启动命令 --requirepass ${REDIS_PASSWORD} 设置

# TLS 配置（未启用）
# tls-cert-file /data/redis.crt
# tls-key-file /data/redis.key
# tls-ca-cert-file /data/ca.crt
# tls-port 6380

# ACL（未启用，使用 requirepass 简化）
# aclfile /data/users.acl

# IOCP 线程（Linux 不适用）
# io-threads 4
# io-threads-do-reads yes

# 集群配置（单节点）
# cluster-enabled yes
# cluster-config-file nodes.conf
# cluster-node-timeout 15000
