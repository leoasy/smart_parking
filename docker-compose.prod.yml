# =============================================
# smart-parking — Docker Compose 生产环境
# =============================================
# 使用方式：
#   1. docker compose -f docker-compose.prod.yml up -d
#   2. 只启动前端：docker compose -f docker-compose.prod.yml up -d ruoyi-ui
# =============================================

name: smart-parking-prod

services:
  # =========================
  # MySQL 8.4 LTS
  # =========================
  mysql:
    image: ${MYSQL_IMAGE:-mysql:8.4}
    container_name: smart-parking-mysql
    restart: always
    cpus: 2
    mem_limit: 2048m
    shm_size: 512m

    environment:
      TZ: ${TZ:-Asia/Shanghai}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-smart_parking}
      MYSQL_USER: ${MYSQL_USER:-smart_parking}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}

    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-time-zone=+08:00
      - --lower_case_table_names=1
      - --max_connections=500
      - --innodb-buffer-pool-size=1024M
      - --innodb-log-file-size=512M
      - --innodb-flush-log-at-trx-commit=1
      - --innodb-flush-method=O_DIRECT
      - --innodb-file-per-table=1
      - --slow-query-log=1
      - --slow-query-log-file=/var/lib/mysql/slow.log
      - --long-query-time=2

    volumes:
      - mysql_data:/var/lib/mysql
      - ./smart_parking.sql:/docker-entrypoint-initdb.d/01-smart_parking.sql:ro
      - ./logs/mysql:/var/lib/mysql

    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 120s

    logging:
      driver: json-file
      options:
        max-size: "200m"
        max-file: "10"
        labels: "service=mysql"

    networks:
      smart-parking-net:
        ipv4_address: 172.28.0.10

  # =========================
  # Redis
  # =========================
  redis:
    image: ${REDIS_IMAGE:-redis:7.4-alpine}
    container_name: smart-parking-redis
    restart: always
    cpus: 1
    mem_limit: 1024m

    environment:
      TZ: ${TZ:-Asia/Shanghai}
      REDIS_PASSWORD: ${REDIS_PASSWORD}

    command:
      - sh
      - -c
      - redis-server --appendonly yes --requirepass "$${REDIS_PASSWORD}" --maxmemory=768mb --maxmemory-policy=allkeys-lru --save "" --appendfsync everysec --lazyfree-lazy-eviction no --lazyfree-lazy-expansion no

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $${REDIS_PASSWORD} ping"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 15s

    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
        labels: "service=redis"

    networks:
      smart-parking-net:
        ipv4_address: 172.28.0.11

  # =========================
  # RuoYi 后端
  # =========================
  ruoyi-server:
    image: ${RUOYI_IMAGE:-smart-parking-ruoyi:latest}
    container_name: smart-parking-ruoyi
    restart: always
    cpus: 2
    mem_limit: 2048m
    shm_size: 256m

    environment:
      TZ: ${TZ:-Asia/Shanghai}

      # Spring Profile
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SERVER_PORT: 8080
      # 数据源
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-smart_parking}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-smart_parking}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}

      # Redis
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      SPRING_DATA_REDIS_DATABASE: ${REDIS_DATABASE:-0}
      AI_FASTAPI_URL: http://parking-ai:8000

      # Druid
      DRUID_LOGIN_USERNAME: ${DRUID_LOGIN_USERNAME}
      DRUID_LOGIN_PASSWORD: ${DRUID_LOGIN_PASSWORD}

      # CORS — 生产环境改为具体前端域名，多个用逗号分隔
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:80}
      CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-false}

      # JVM
      JAVA_OPTS: "-Xms1024m -Xmx1536m -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -Djava.security.egd=file:/dev/./urandom"

    volumes:
      - upload_data:/data/upload
      - ./logs/ruoyi:/data/logs

    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8080/actuator/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 120s

    logging:
      driver: json-file
      options:
        max-size: "200m"
        max-file: "10"
        labels: "service=ruoyi-server"

    networks:
      smart-parking-net:
        ipv4_address: 172.28.0.20

  # =========================
  # Parking AI 服务
  # =========================
  parking-ai:
    image: ${AI_IMAGE:-smart-parking-ai:latest}
    container_name: smart-parking-ai
    restart: always
    cpus: 2
    mem_limit: 2048m

    environment:
      TZ: ${TZ:-Asia/Shanghai}
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"

      RUOYI_BASE_URL: http://ruoyi-server:8080
      RUOYI_PARKING_API: /biz/parking/detect
      RUOYI_PUSH_TIMEOUT_SECONDS: "3.0"
      SLOT_CODE_FORMAT: "{parking_lot_id}-{slot_id}"

    volumes:
      - ./Parking_Ai/model:/app/model:ro
      - ./Parking_Ai/data:/app/data

    depends_on:
      ruoyi-server:
        condition: service_healthy

    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8000/health >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 60s

    logging:
      driver: json-file
      options:
        max-size: "200m"
        max-file: "10"
        labels: "service=parking-ai"

    networks:
      smart-parking-net:
        ipv4_address: 172.28.0.30

    # GPU 支持（取消注释并安装 nvidia-docker）
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # =========================
  # 前端 Nginx
  # =========================
  ruoyi-ui:
    image: ${UI_IMAGE:-smart-parking-ui:latest}
    container_name: smart-parking-ui
    restart: always
    cpus: 1
    mem_limit: 512m

    environment:
      TZ: ${TZ:-Asia/Shanghai}

    ports:
      - "${UI_HOST_PORT:-80}:80"
      - "${UI_SSL_PORT:-443}:443"

    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro

    depends_on:
      ruoyi-server:
        condition: service_healthy

    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s

    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
        labels: "service=ruoyi-ui"

    networks:
      smart-parking-net:
        ipv4_address: 172.28.0.40

  # =========================
  # Prometheus 监控
  # =========================
  prometheus:
    image: ${PROMETHEUS_IMAGE:-prom/prometheus:v2.50.0}
    container_name: smart-parking-prometheus
    restart: always
    cpus: 1
    mem_limit: 1024m

    environment:
      TZ: ${TZ:-Asia/Shanghai}
      PROMETHEUS_RETENTION_TIME: ${PROMETHEUS_RETENTION_TIME:-15d}
      PROMETHEUS_STORAGE_TSDB_PATH: /prometheus

    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME:-15d}'
      - '--storage.tsdb.retention.size=${PROMETHEUS_STORAGE_SIZE:-512MB}'
      - '--web.enable-lifecycle'
      - '--log.level=info'

    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus

    depends_on:
      ruoyi-server:
        condition: service_healthy

    healthcheck:
      test: [ "CMD-SHELL", "wget -q --spider http://127.0.0.1:9090/-/healthy || exit 1" ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s

    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
        labels: "service=prometheus"

    networks:
      smart-parking-net:
        ipv4_address: 172.28.0.50

  # =========================
  # Grafana 可视化
  # =========================
  grafana:
    image: ${GRAFANA_IMAGE:-grafana/grafana:10.4.0}
    container_name: smart-parking-grafana
    restart: always
    cpus: 1
    mem_limit: 512m

    environment:
      TZ: ${TZ:-Asia/Shanghai}
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-prom-operator}
      GF_SECURITY_DISABLE_INITIAL_ADMIN_CREATION: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3000}
      GF_SERVER_DOMAIN: ${GRAFANA_DOMAIN:-localhost}
      GF_ALERTING_ENABLED: "true"
      GF_ALERTING_ERROR_ORPHANED_CLEANUP_ENABLED: "true"
      GF_FEATURE_TOGGLES_ENABLE: "publicDashboards"
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana

    depends_on:
      prometheus:
        condition: service_healthy

    healthcheck:
      test: [ "CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/api/health || exit 1" ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 60s

    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
        labels: "service=grafana"

    networks:
      smart-parking-net:
        ipv4_address: 172.28.0.51

volumes:
  mysql_data:
    name: smart-parking-mysql-data-prod

  redis_data:
    name: smart-parking-redis-data-prod

  upload_data:
    name: smart-parking-upload-data-prod

  prometheus_data:
    name: smart-parking-prometheus-data-prod

  grafana_data:
    name: smart-parking-grafana-data-prod

networks:
  smart-parking-net:
    name: smart-parking-net-prod
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
