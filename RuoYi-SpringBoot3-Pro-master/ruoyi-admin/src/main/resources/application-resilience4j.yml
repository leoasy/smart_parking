# =========================================
# Resilience4j 熔断降级配置
# =========================================

resilience4j:
  # 熔断器配置
  circuitbreaker:
    configs:
      default:
        # 滑动窗口类型：COUNT_BASED（按次数）/ TIME_BASED（按时间）
        slidingWindowType: COUNT_BASED
        # 滑动窗口大小
        slidingWindowSize: 10
        # 熔断器打开的最小调用次数
        minimumNumberOfCalls: 5
        # 失败率阈值（百分比）
        failureRateThreshold: 50
        # 熔断器打开持续时间
        waitDurationInOpenState: 30s
        # 半开状态允许的调用次数
        permittedNumberOfCallsInHalfOpenState: 3
        # 自动从打开变为半开
        automaticTransitionFromOpenToHalfOpenEnabled: true
        # 记录失败异常的 predicates
        recordExceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - org.springframework.web.client.RestClientException
        # 忽略的异常（不计入失败率）
        ignoreExceptions:
          - java.lang.IllegalArgumentException
    instances:
      # AI服务熔断器
      aiService:
        baseConfig: default
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
      # 外部API熔断器
      externalApi:
        baseConfig: default
        slidingWindowSize: 5
        failureRateThreshold: 60
        waitDurationInOpenState: 20s

  # 重试配置
  retry:
    configs:
      default:
        maxAttempts: 3
        waitDuration: 500ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
    instances:
      # AI服务重试
      aiService:
        baseConfig: default
        maxAttempts: 3
        waitDuration: 500ms
      # 外部API重试
      externalApi:
        baseConfig: default
        maxAttempts: 2
        waitDuration: 300ms

  # 限流配置
  ratelimiter:
    configs:
      default:
        timeoutDuration: 1s
        limitRefreshPeriod: 1s
        limitForPeriod: 100
    instances:
      aiService:
        baseConfig: default
        limitForPeriod: 50
      externalApi:
        baseConfig: default
        limitForPeriod: 30

  # 舱壁（Bulkhead）配置
  bulkhead:
    configs:
      default:
        maxConcurrentCalls: 100
        maxWaitDuration: 500ms
    instances:
      aiService:
        baseConfig: default
        maxConcurrentCalls: 20
      externalApi:
        baseConfig: default
        maxConcurrentCalls: 50