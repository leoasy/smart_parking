# =========================================
# Docker 环境专属配置
# 覆盖 application-devmy.yml 中的连接地址
# 激活方式: SPRING_PROFILES_ACTIVE=devmy,docker
# =========================================

# RuoYi 配置
ruoyi:
  # Linux 路径，由 docker-compose volume 挂载
  profile: /data/upload

spring:
  datasource:
    druid:
      master:
        # 通过 Docker 服务名访问 MySQL，不启用 SSL
        url: jdbc:mysql://mysql:3306/smart_parking?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
        username: root
        password: ${MYSQL_ROOT_PASSWORD}
  data:
    redis:
      host: redis
      port: 6379
      password:
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: -1ms

# Resilience4j 熔断配置
resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
    instances:
      aiService:
        baseConfig: default
  retry:
    configs:
      default:
        maxAttempts: 3
        waitDuration: 500ms
    instances:
      aiService:
        baseConfig: default
