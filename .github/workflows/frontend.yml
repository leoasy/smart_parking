name: Frontend CI/CD

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'RuoYi-SpringBoot3-ElementPlus-master/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    branches:
      - master
      - main
    paths:
      - 'RuoYi-SpringBoot3-ElementPlus-master/**'
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  # ===== 前端代码检查 & 构建 =====
  frontend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: RuoYi-SpringBoot3-ElementPlus-master

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: RuoYi-SpringBoot3-ElementPlus-master/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Lint check
        run: npm run lint || true

      - name: Build production
        run: npm run build:prod

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ github.run_id }}
          path: RuoYi-SpringBoot3-ElementPlus-master/dist/
          retention-days: 7

  # ===== Docker 镜像构建 =====
  docker-build:
    needs: frontend-ci
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_REGISTRY }}/smart-parking-ui
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./RuoYi-SpringBoot3-ElementPlus-master
          file: ./RuoYi-SpringBoot3-ElementPlus-master/Dockerfile.nginx
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===== 部署到服务器 =====
  deploy:
    needs: docker-build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Deploy to server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          ssh -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_HOST << 'EOF'
            cd /opt/smart-parking
            docker compose pull ruoyi-ui
            docker compose up -d ruoyi-ui
            docker image prune -f
          EOF

      - name: Smoke test
        run: |
          curl -sf http://${{ secrets.SERVER_HOST }}:${{ secrets.UI_PORT || 80 }}/health || exit 1
          echo "Frontend deployment verified"
