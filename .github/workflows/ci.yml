name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  # ===== Python AI =====
  python-ai-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Parking_Ai
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install Python deps
        run: pip install -r requirements.txt
      - name: Run Python tests
        run: pytest -q

  # ===== Java Backend =====
  ruoyi-biz-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: RuoYi-SpringBoot3-Pro-master
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Run Maven tests
        run: mvn -pl ruoyi-biz -am test --dangerously-skip-permissions

  # ===== Frontend Build =====
  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: RuoYi-SpringBoot3-ElementPlus-master
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: RuoYi-SpringBoot3-ElementPlus-master/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build:prod
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: RuoYi-SpringBoot3-ElementPlus-master/dist/
          retention-days: 7

  # ===== Docker Build & Integration Test =====
  docker-build:
    needs: [python-ai-tests, ruoyi-biz-tests, frontend-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        if: github.event_name == 'push'
      - name: Build all services
        run: |
          docker compose build --parallel
      - name: Start services
        run: docker compose up -d
      - name: Wait for services
        run: |
          sleep 10
          for svc in ruoyi-server parking-ai; do
            for i in $(seq 1 30); do
              if docker compose exec -T $svc wget -q --spider http://localhost:8000/health 2>/dev/null; then
                echo "$svc is ready"
                break
              fi
              sleep 2
            done
          done
      - name: Run smoke tests
        run: |
          echo "Testing AI health..."
          curl -sf http://localhost:8000/health || exit 1
          echo "Testing backend health..."
          curl -sf http://localhost:8087/actuator/health || exit 1
          echo "All smoke tests passed"
      - name: Stop services
        if: always()
        run: docker compose down --remove-orphans
