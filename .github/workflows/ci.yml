name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  # ===== Python AI =====
  python-ai-tests:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}/Parking_Ai
    defaults:
      run:
        working-directory: Parking_Ai
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install Python deps
        run: pip install -r requirements.txt
      - name: Run Python tests
        run: pytest -q

  # ===== Java Backend =====
  ruoyi-biz-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: RuoYi-SpringBoot3-Pro-master
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Run Maven tests
        run: mvn -pl ./ruoyi-biz -am test

  # ===== Frontend Build =====
  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: RuoYi-SpringBoot3-ElementPlus-master
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: RuoYi-SpringBoot3-ElementPlus-master/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build:prod
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: RuoYi-SpringBoot3-ElementPlus-master/dist/
          retention-days: 7

  # ===== Docker Config & Frontend Image =====
  docker-build:
    needs: [python-ai-tests, ruoyi-biz-tests, frontend-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create CI env file
        run: |
          cat > .env <<'EOF'
          MYSQL_ROOT_PASSWORD=ci_root_password
          MYSQL_USER=smart_parking
          MYSQL_PASSWORD=ci_password
          MYSQL_DATABASE=smart_parking
          REDIS_PASSWORD=ci_redis_password
          REDIS_DATABASE=0
          SPRING_PROFILES_ACTIVE=devmy,docker
          DRUID_LOGIN_USERNAME=ci
          DRUID_LOGIN_PASSWORD=ci_druid_password
          TZ=Asia/Shanghai
          CORS_ALLOWED_ORIGINS=http://localhost:80
          CORS_ALLOW_CREDENTIALS=false
          EOF
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Validate compose config
        run: docker compose config
      - name: Build frontend image
        run: docker compose build ruoyi-ui
