name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  python-ai-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Parking_Ai
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install Python deps
        run: pip install -r requirements.txt
      - name: Run Python tests
        run: pytest -q

  ruoyi-biz-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: RuoYi-SpringBoot3-Pro-master
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Run Maven tests
        run: mvn -pl ruoyi-biz -am test
