# Grafana 自动配置仪表盘
# 挂载到 /etc/grafana/provisioning/dashboards/
apiVersion: 1

providers:
  - name: 'Smart Parking Dashboards'
    orgId: 1
    folder: 'Smart Parking'
    folderUid: 'smart-parking'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
