# Grafana 自动配置仪表盘
# 挂载到 /etc/grafana/provisioning/dashboards/
apiVersion: 1

providers:
  - name: '社区车位占用检测系统大屏'
    orgId: 1
    folder: '社区车位占用检测系统'
    folderUid: 'smart-parking'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
