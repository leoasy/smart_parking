# 项目相关配置
ruoyi:
  # 名称
  name: 社区车位占用检测系统
  # 版本
  version: 3.9.1
  # 版权年份
  copyrightYear: 2026
  # 文件上传目录
  profile: ${UPLOAD_PROFILE:D:/smart-parking/uploadPath}
  # 获取ip地址开关
  addressEnabled: false
  # 验证码类型 math 数字计算 char 字符验证
  captchaType: math

# 开发环境配置
server:
  # 服务器的HTTP端口，默认为8080
  port: 8087
  servlet:
    # 应用的访问路径
    context-path: /
  tomcat:
    # tomcat的URI编码
    uri-encoding: UTF-8
    # 连接数满后的排队数，默认为100
    accept-count: 1000
    threads:
      # tomcat最大线程数，默认为200
      max: 800
      # Tomcat启动初始化的线程数，默认值10
      min-spare: 100

# 日志配置
logging:
  level:
    com.ruoyi: debug
    org.springframework: warn

# 用户配置
#user:
#  password:
#    # 密码最大错误次数
#    maxRetryCount: 5
#    # 密码锁定时间（默认10分钟）
#    lockTime: 10

# Spring配置
spring:
  config:
    import:
      - "optional:file:.env[.properties]"
      - "optional:file:../.env[.properties]"
  autoconfigure:
    exclude:
      - io.github.resilience4j.springboot3.ratelimiter.autoconfigure.RateLimiterAutoConfiguration
      - io.github.resilience4j.springboot3.ratelimiter.autoconfigure.RateLimiterMetricsAutoConfiguration
      - io.github.resilience4j.springboot3.ratelimiter.autoconfigure.RateLimitersHealthIndicatorAutoConfiguration
  # 资源信息
  messages:
    # 国际化资源文件路径
    basename: i18n/messages
  # 文件上传
  servlet:
    multipart:
      # 单个文件大小
      max-file-size: 100MB
      # 设置总上传的文件大小
      max-request-size: 200MB
  # 服务模块
  devtools:
    restart:
      # 热部署开关
      enabled: true
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driverClassName: com.mysql.cj.jdbc.Driver
    druid:
      master:
        url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:smart_parking}?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
        username: ${MYSQL_USER:Server}
        password: ${MYSQL_PASSWORD:}
      slave:
        enabled: false
        url:
        username:
        password:
      initialSize: 5
      minIdle: 10
      maxActive: 20
      maxWait: 60000
      connectTimeout: 30000
      socketTimeout: 60000
      timeBetweenEvictionRunsMillis: 60000
      minEvictableIdleTimeMillis: 300000
      maxEvictableIdleTimeMillis: 900000
      validationQuery: SELECT 1 FROM DUAL
      testWhileIdle: true
      testOnBorrow: false
      testOnReturn: false
      webStatFilter:
        enabled: true
      statViewServlet:
        enabled: true
        allow:
        url-pattern: /druid/*
        login-username: ${DRUID_USERNAME:admin}
        login-password: ${DRUID_PASSWORD:}
      filter:
        stat:
          enabled: true
          log-slow-sql: true
          slow-sql-millis: 1000
          merge-sql: true
        wall:
          config:
            multi-statement-allow: true
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:1}
      password: ${REDIS_PASSWORD:}
      timeout: 10s
      lettuce:
        pool:
          min-idle: 0
          max-idle: 8
          max-active: 8
          max-wait: -1ms

# token配置
token:
  # 是否允许多端登录（true 表示允许，false 表示不允许）
  singleLogin: true
  # 令牌自定义标识
  header: Authorization
  # 令牌密钥
  secret: ${TOKEN_SECRET:change-me-before-run}
  # 令牌有效期（默认1年）
  expireTime: 525600

# MyBatis配置
mybatis-plus:
  # 搜索指定包别名
  typeAliasesPackage: com.ruoyi.**.domain
  # 配置mapper的扫描，找到所有的mapper.xml映射文件
  mapperLocations: classpath*:mapper/**/*Mapper.xml
  # 加载全局的配置文件
  configLocation: classpath:mybatis/mybatis-config.xml

# Swagger配置
swagger:
  # 是否开启swagger
  enabled: false
  # 请求前缀
  pathMapping: /dev-api

# 防止XSS攻击
xss:
  # 过滤开关
  enabled: true
  # 排除链接（多个用逗号分隔）
  excludes: /system/notice
  # 匹配链接
  urlPatterns: /system/*,/monitor/*,/tool/*

#多租户配置
tenant:
  enable: false
  column: tenant_id
  filterTables:
  ignoreTables:
    - QRTZ_BLOB_TRIGGERS
    - QRTZ_CALENDARS
    - QRTZ_CRON_TRIGGERS
    - QRTZ_FIRED_TRIGGERS
    - QRTZ_JOB_DETAILS
    - QRTZ_LOCKS
    - QRTZ_PAUSED_TRIGGER_GRPS
    - QRTZ_SCHEDULER_STATE
    - QRTZ_SIMPLE_TRIGGERS
    - QRTZ_SIMPROP_TRIGGERS
    - QRTZ_TRIGGERS
    - gen_table
    - gen_table_column
    - sys_config
    - sys_dept
    - sys_dict_data
    - sys_dict_type
    - sys_job
    - sys_job_log
    - sys_logininfor
    - sys_menu
    - sys_notice
    - sys_oper_log
    - sys_post
    - sys_role
    - sys_role_dept
    - sys_role_menu
    - sys_user
    - sys_user_post
    - sys_user_role
    - biz_region
  ignoreLoginNames:
    - admin

# OpenAI配置
openai:
  # API密钥
  api-key: ${OPENAI_API_KEY:}
  # 基础URL
  base-url: https://api.openai.com/v1
  # 默认模型
  model: gpt-4o
  # 代理配置
  proxy:
    # 是否启用代理
    enabled: false
    # 代理类型 (HTTP/SOCKS)
    type: HTTP
    # 代理主机
    host: 127.0.0.1
    # 代理端口
    port: 7890

# https://www.ssssssss.org/magic-api/pages/config/spring-boot/
magic-api:
  web: /magic/web
  editor-config: classpath:./magic-editor-config.js
  resource:
    type: database
    tableName: magic_api_file
  prefix: /magic/api
  security:
    username: ${MAGIC_API_USERNAME:admin}
    password: ${MAGIC_API_PASSWORD:}
  backup:
    enable: true
    max-history: -1
    table-name: magic_backup_record
  response: |-
    {
      code: code,
      msg: message,
      data,
    }

# 阿里短信配置
alisms:
  key: your_access_key_id
  secret: your_access_key_secret
  sign: your_sign_name
  templates:
    - your_template_code

# 二次验证配置
secondary-verification:
  enabled: false

# 防盗链配置
referer:
  # 防盗链开关
  enabled: false
  # 允许的域名列表
  allowed-domains: localhost,127.0.0.1

#FASTAPI
ai:
  fastapi:
    url: ${AI_FASTAPI_URL:http://127.0.0.1:8000}

# Actuator + Prometheus 监控配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name:ruoyi}
  tracing:
    sampling:
      probability: 1.0
